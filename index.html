<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Nexora AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- VIDEO BACKGROUND: root.mp4 -->
  <video class="video-background" autoplay loop muted playsinline>
    <source src="root.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>
  <div class="overlay-dark"></div>

  <div class="app">
    <div class="header">
      <h1>Nexora AI</h1>
      <button onclick="clearChat()" class="clear-btn">
        <i class="fas fa-trash-alt"></i> Clear
      </button>
    </div>

    <div id="chatBox" class="chat-box">
      <div class="msg ai">
        <i class="fas fa-sparkles"></i> <strong>Nexora AI ready.</strong><br>
        Ask me anything — real-time web search via Tavily.
      </div>
    </div>

    <div class="input-area">
      <input id="input" type="text" placeholder="Message Nexora..." autocomplete="off">
      <button onclick="startVoice()" class="voice-btn">
        <i class="fas fa-microphone"></i>
      </button>
      <button onclick="send()" class="send-btn">
        <i class="fas fa-paper-plane"></i>
      </button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
